<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product landing page</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
     <nav class="navbar">

        <div class="logo">
            <img src="Images/logo (2).png" alt="Shopify Logo">
            <span>Shopify</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>

    </nav>

    <section class="contact-section">

    <h1>Get In Touch</h1>

    <p>
        Fill out the form below and become part of our shopping community.
    </p>

    <form class="contact-form">

        <!-- Full Name -->

        <label>Full Name</label>

        <input
            type="text"
            placeholder="Enter your full name"
            required
        >

        <!-- Email -->

        <label>Email Address</label>

        <input
            type="email"
            placeholder="Enter your email"
            required
        >

        <!-- Phone -->

        <label>Phone Number</label>

        <input
            type="tel"
            placeholder="Enter your phone number"
            required
        >

        <!-- Date -->

        <label>Date of Birth</label>

        <input
            type="date"
            required
        >

        <!-- Dropdown -->

        <label>Preferred Shopping Category</label>

        <select required>

            <option value="">
                Select Category
            </option>

            <option>Fashion</option>

            <option>Electronics</option>

            <option>Beauty</option>

            <option>Accessories</option>

        </select>

        <!-- Radio Buttons -->

        <label>Membership Plan</label>

        <div class="radio-group">

            <label>
                <input type="radio" name="plan" required>
                Basic
            </label>

            <label>
                <input type="radio" name="plan">
                Premium
            </label>

            <label>
                <input type="radio" name="plan">
                Elite
            </label>

        </div>

        <!-- Checkboxes -->

        <label>Interests</label>

        <div class="checkbox-group">

            <label>
                <input type="checkbox">
                Clothing
            </label>

            <label>
                <input type="checkbox">
                Shoes
            </label>

            <label>
                <input type="checkbox">
                Gadgets
            </label>

            <label>
                <input type="checkbox">
                Beauty Products
            </label>

        </div>

        <!-- Text Area -->

        <label>Additional Message</label>

        <textarea
            rows="5"
            placeholder="Write your message here..."
        ></textarea>

        <!-- Buttons -->

        <div class="form-buttons">

            <button type="submit">
                Submit
            </button>

            <button type="reset">
                Reset
            </button>

        </div>

    </form>

</section>
<footer>

    <h3>Contact Us</h3>

    <p>Email: support@shopify.com</p>

    <p>Phone: +91 9876543210</p>

    <p>© 2026 Shopify. All Rights Reserved.</p>

</footer>

</body>
</html>
    
</body>
</html>
